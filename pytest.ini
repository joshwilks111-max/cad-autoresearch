[pytest]
# Markers. Register `slow` so `pytest --strict-markers` doesn't warn and the
# convention is discoverable.
#
#   FAST inner loop (seconds):   pytest -m "not slow"
#   FULL gate (pre-ship / CI):   pytest          (runs everything)
#
# `slow` = a test that runs the full voxelised IoU/grade path on real meshes
# (a 48^3 voxelize + the 48-transform search per part). Those are the integration
# gates; the logic/unit tests (body gate, SIoU algebra, _dilate_axial, reward
# wiring) carry no voxelization and stay in the default fast lane. Mark by EVIDENCE
# (pytest --durations), not by guess: the four marked tests are ~186s of the ~190s
# test_reward.py wall-clock; everything else is sub-6s.
markers =
    slow: end-to-end voxelised grade/IoU on real meshes (~30-65s each). Skip in the
        fast inner loop with `-m "not slow"`; always run before /ship and in CI.
