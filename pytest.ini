[pytest]
# Markers. Register `slow` so `pytest --strict-markers` doesn't warn and the
# convention is discoverable.
#
#   FAST inner loop (seconds):   pytest -m "not slow"
#   FULL gate (pre-ship / CI):   pytest          (runs everything)
#
# `slow` = a test that runs the full voxelised IoU/grade path on real meshes
# (a 48^3 voxelize + the 48-transform search per part). Those are the integration
# gates; the logic/unit tests (body gate, SIoU algebra, _dilate_axial wrap + wiring,
# reward wiring) carry no voxelization and stay in the default fast lane. Mark by
# EVIDENCE (pytest --durations), not by guess: the marked tests dominate the
# test_reward.py + test_topology_hybrid.py wall-clock; the fast lane is sub-6s.
# Per-test cost varies ~3-90s: e.g. the round-part washer pin ~16s, a shallow-groove
# single-IoU ~3s, a full six-layer grade up to ~90s.
markers =
    slow: end-to-end voxelised grade/IoU on real meshes; skip in the fast inner loop with -m "not slow", always run before /ship and in CI
