# Task registry for the CAD autoresearch harness.
#
# Each task points at a spec (spec track) and optionally a drawing image
# (drawing track) plus a ground_truth/ folder built by its make_ground_truth.py.
# `default_track` chooses which input the worker uses unless overridden by
# --track on the command line.
#
# tier:  easy | medium | hard   (matches the literature's difficulty banding)
# Keep ground truth out of the agent's reach — the harness loads it, the agent
# never sees it.

tasks:
  - id: sample_bracket
    tier: easy
    description: 80x50x8 plate, four M5 holes, central through-slot.
    spec: spec.md
    drawing: drawing.png          # optional; add it to enable --track drawing
    default_track: spec
    notes: Built-in smoke test. Mock proposer converges to ~1.0 on the spec track.

  - id: thinwall_box
    tier: easy
    description: 80x60x30 open-top tray, 2mm walls (thin-wall element probe).
    spec: spec.md
    default_track: spec
    notes: Element-probe — tests whether the IoU voxelization handles thin (sub-voxel) walls. See make_ground_truth.py header.

  - id: twin_bodies
    tier: easy
    description: two identical 30x30x20 boxes 80mm apart (multi-body element probe).
    spec: spec.md
    default_track: spec
    notes: Element-probe — tests whether pose-invariant IoU (PCA frame) handles 2 disjoint solids. See make_ground_truth.py.

  - id: rib_probe
    tier: easy
    description: 80x40x5 plate + 12 small ribs (small-feature gradient probe).
    spec: spec.md
    default_track: spec
    notes: Throwaway probe for the small-feature-precision fix (iou_res). 1mm rib shift should now score well below perfect.

  - id: perf_plate
    tier: easy
    description: 60x40x4 plate with 15 through-holes (surface-area-gap probe).
    spec: spec.md
    default_track: spec
    notes: Probe � tests whether the COMPOSITE discriminates missing holes (surface-area blind spot check).

  - id: stepped_hub
    tier: easy
    description: Ø60x8 flange + Ø36x18 hub + Ø16 axial bore + chamfer (clean round part).
    spec: spec.md
    default_track: spec
    notes: Fully rotationally-symmetric — validates the cylindrical round-part IoU end-to-end to >=0.95 (round analog of motor_mount).

  - id: motor_mount
    tier: easy
    description: 100x70x10 plate, central Ø40 hub (h25) with Ø16 axial bore, 4 mounting holes, chamfered hub.
    spec: spec.md
    default_track: spec
    notes: Synthetic spec-track validation part — a step up from sample_bracket (hub + bore + chamfer + hole pattern, 15 faces). Reachable to >=0.95; used to validate the loop end-to-end.

  - id: nist_ftc_11
    tier: easy
    description: NIST PMI FTC-11 — simplest NIST part, 6 faces, flat square plate ~63 x 63 x 3 mm.
    spec: spec.md                 # stub; drawing-track part
    default_track: drawing
    notes: >
      Real NIST MBE PMI test case (US Government work, unrestricted — committable).
      Ground truth ingested from nist_ftc_11_asme1_rb.stp (AP203, 7.6 KB) via make_ground_truth.py.
      Smallest NIST part: 6 faces, 1 solid, euler=2. Reconstructable to >=0.95 on spec track
      (it is essentially Box(63,63,3)). Used as the first real-part pipeline probe.

  - id: nist_stc_06
    tier: hard
    description: NIST PMI STC-06 — toleranced prismatic part, ~144 faces, bbox ~247.65 x 304.80 x 127.89 mm.
    spec: spec.md                 # stub only; this is a drawing-track part (no hand-authored spec)
    drawing: drawing.png          # STC_06.pdf rasterised — the real input for this task
    default_track: drawing
    notes: >
      Real NIST MBE PMI test case (US Government work, unrestricted — committable).
      Ground truth ingested from nist_stc_06_asme1_ap242-e3.stp via make_ground_truth.py.
      Hard, vision-bound: the agent reads drawing.png (GD&T) and derives all geometry.
      No faithful spec.md is provided on purpose — authoring one from a 144-face STEP
      would be reverse-engineering the answer. Use --track drawing.

  - id: nist_ftc_07
    tier: hard
    description: NIST PMI FTC-07 — AP242-e2 annotated part, 306 faces, 3 shells, bbox ~352 x 136 x 263 mm.
    spec: spec.md
    default_track: drawing
    notes: >
      Real NIST MBE PMI test case (US Government work, unrestricted — committable).
      Ground truth ingested from nist_ftc_07_asme1_ap242-e2.stp via make_ground_truth.py.
      Notable: 3 shells within 1 solid (euler=0) — adversarial topology probe.
      Hard drawing-track benchmark; not reconstructable to >=0.95 on spec track alone.

  - id: nist_ftc_09
    tier: hard
    description: NIST PMI FTC-09 — AP242-e1 annotated part, 163 faces, 6 shells, bbox ~227 x 5.3 x 279 mm (sheet-like).
    spec: spec.md
    default_track: drawing
    notes: >
      Real NIST MBE PMI test case (US Government work, unrestricted — committable).
      Ground truth ingested from nist_ftc_09_asme1_ap242-e1.stp via make_ground_truth.py.
      Notable: Y-axis is 5.3 mm (extreme sheet), 6 shells, euler=328.
      The STEP file is 5.9 MB — largest FTC; likely a perforated thin plate.
      Not reconstructable to >=0.95 on spec track.

  - id: nist_ctc_03
    tier: medium
    description: NIST PMI CTC-03 — AP242-e2 annotated part, 120 faces, bbox ~320 x 534 x 163 mm.
    spec: spec.md
    default_track: drawing
    notes: >
      Real NIST MBE PMI test case (US Government work, unrestricted — committable).
      Ground truth ingested from nist_ctc_03_asme1_ap242-e2.stp via make_ground_truth.py.
      Notable: euler=95 (many through-holes / pockets), elongated footprint, 1 shell.
      Medium complexity; spec track may reach >=0.80 if pockets are correctly inferred.

  - id: nist_ctc_05
    tier: hard
    description: NIST PMI CTC-05 — AP242-e1 annotated part, 156 faces, bbox ~527 x 559 x 483 mm (large).
    spec: spec.md
    default_track: drawing
    notes: >
      Real NIST MBE PMI test case (US Government work, unrestricted — committable).
      Ground truth ingested from nist_ctc_05_asme1_ap242-e1.stp via make_ground_truth.py.
      Notable: very large bbox (~527x559x483 mm) but moderate face count (156).
      Low volume fill ratio (~12646 cm^3 / ~142,400 cm^3 bbox = ~8.9%).
      Hard drawing-track benchmark.

  - id: pulley_vgroove
    tier: easy
    description: Ø80x20 V-belt pulley + 40deg vee groove (12mm deep, root Ø56) + Ø40 hub (w32) + Ø20 bore + bore chamfers.
    spec: spec.md
    default_track: spec
    notes: Fully rotationally-symmetric round part — validates the cylindrical round-part IoU on a NEW grooved (vee-notch) profile distinct from stepped_hub. Reachable to >=0.95.

  - id: flanged_bushing
    tier: easy
    description: Ø30x40 flanged sleeve bushing + Ø56x6 base flange + Ø18 through bore + Ø24x8 top counterbore + rim/bore chamfers.
    spec: spec.md
    default_track: spec
    notes: Fully rotationally-symmetric round part with a counterbore — stress-tests the cylindrical IoU on a STEPPED INNER DIAMETER (Ø18 bore stepping to Ø24 at Z=32), distinct from stepped_hub (outer step) and pulley_vgroove (vee groove). Reachable to >=0.95.

  - id: slotted_ring
    tier: easy
    description: Castle-nut collar Ø50 outer / Ø28 bore / h18 + 6 axial top-face slots (5w x 8deep, 60deg polar) + 1mm rim chamfer.
    spec: spec.md
    default_track: spec
    notes: Rotational-symmetry-gate probe. _is_rotationally_symmetric returns TRUE despite the 6 slots (too small a volume fraction to perturb the covariance eigenvalues past tol), so iou() takes the cylindrical path. Tests whether the cylindrical (angle-collapsed) IoU can still discriminate slot count/width; baseline bounding-cyl composite=0.415.

  - id: hex_bolt
    tier: easy
    description: Hex-head shoulder bolt — hex head (across-flats 24mm, h10) + Ø16 round shank (L40) + 1mm shank-tip chamfer + 0.8mm/30deg head-edge chamfer. Single solid, bbox 27.7 x 24 x 50 mm, vol ~12988 mm^3.
    spec: spec.md
    default_track: spec
    notes: >
      MIXED prismatic hex-head + round-shank part (coaxial about Z). Intended as the voxel-IoU contrast to the pure-round parts, BUT _is_rotationally_symmetric returns TRUE on the hex head: a regular hexagon has 6-fold in-plane symmetry so its two in-plane covariance eigenvalues are near-equal (33.93 vs 33.81, ratio 0.0035 << tol 0.05) and the gate sees a shaft, so iou() actually takes the CYLINDRICAL (angle-collapsed) path, not the voxel path.
      Useful datapoint: a hex prism is prismatic to a human but rotationally-symmetric to the eigenvalue gate. Baseline full-part bounding-box composite=0.344.

